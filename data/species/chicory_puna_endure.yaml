anthelmintic_properties:
    value: "contains sesquiterpene lactones with demonstrated direct anthelmintic (anti-parasitic) activity - a chicory extract at 50mg/ml concentration killed all Haemonchus contortus worms within 4 hours in vitro; feeding diets of >=70% chicory DM significantly reduces worm burdens and faecal egg counts in grazing ruminants in vivo"
    units: qualitative
    source: peer-reviewed review, "Chemical Composition and Nutritive Benefits of Chicory (Cichorium intybus)" (PMC5745685); corroborated by multiple other peer-reviewed sources found in this research pass (Springer Parasites & Vectors review; ScienceDirect Cooperia oncophora study)
    confidence: High

drought_tolerance_and_rooting:
    value: "perennial taproot broadleaf herb with deep rooting habit; thrives at a minimum annual rainfall of ~600mm and tolerates low soil pH - moderate-to-good drought adaptation for a broadleaf forage herb"
    units: qualitative
    source: peer-reviewed review, "Chemical Composition and Nutritive Benefits of Chicory (Cichorium intybus)" (PMC5745685)
    confidence: Medium

cultivar_note:
    value: "'Puna II' is a specifically named, established forage chicory cultivar referenced in agricultural research literature - the mix's 'PUNA' component likely refers to this or a related cultivar; 'ENDURE' was not independently identified as a separately documented named cultivar in this research pass"
